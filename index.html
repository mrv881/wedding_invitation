<title>Ratna Varun &amp; Deepthi — Wedding</title>

<!-- Preload venue images for faster display -->

<link rel="preload" as="image" href="https://lh3.googleusercontent.com/p/AF1QipOIBBP2LZ_Y97CT3a-NrCpY0bLI3dYTSHUINnxI=w1200-k-no">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
.fonts-ready,.fonts-ready body{opacity:1!important;}
html,body{width:100%;min-height:100%;overflow-x:hidden;opacity:0;transition:opacity .2s ease;background:#f5efe6;}

#s2{
  position:fixed;inset:0;z-index:900;
  background:linear-gradient(160deg,#faf6f0 0%,#f0e6d8 45%,#e8dfd0 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:1;pointer-events:all;
  padding:clamp(28px,8vw,44px) 22px clamp(32px,9vw,52px);
  text-align:center;overflow:hidden;
}

/* Intro stack: content sits above petals so button is clickable */
.s2-content{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(14px,3.5vw,20px);
  width:100%;max-width:380px;
  pointer-events:auto;
}
#petal2{
  position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none;
}
.petal{position:absolute;border-radius:60% 40% 60% 40%;animation:petalFall linear infinite;pointer-events:none;}
@keyframes petalFall{
  0%{transform:translateY(-40px) rotate(0deg);opacity:0;}
  8%{opacity:.75;}88%{opacity:.4;}
  100%{transform:translateY(110vh) rotate(900deg) translateX(var(--sw));opacity:0;}
}
#s2 .s2-sub{
  font-family:'Cormorant Garamond',serif;font-weight:700;
  font-size:clamp(.85rem,3.2vw,.95rem);
  letter-spacing:6px;color:#5C3317;text-transform:uppercase;
  line-height:1.45;margin:0;padding:0 4px;
}
.gold-bar{display:flex;align-items:center;gap:10px;margin:0 auto;width:80%;max-width:260px;}
.gl{flex:1;height:1px;background:linear-gradient(90deg,transparent,#cd7f32,transparent);}
.gd{width:6px;height:6px;background:#cd7f32;transform:rotate(45deg);flex-shrink:0;}
.s2-title-block{
  display:flex;flex-direction:column;align-items:center;
  margin:0;padding:0;
}
.s2-title{
  font-family:'Great Vibes',cursive;
  font-size:clamp(2.5rem,10vw,3.6rem);
  color:#5C3317;line-height:1.18;
  margin:0;padding:0 8px;
  text-shadow:0 0 30px rgba(205,127,50,.8);
  animation:gPulse 3s ease-in-out infinite;
}
.s2-title-amp{
  font-family:'Cormorant Garamond',serif;font-size:clamp(.95rem,3.6vw,1.12rem);
  letter-spacing:0;color:#5C3317;font-weight:600;
  line-height:1;padding:6px 0 4px;margin:0;
}
@keyframes gPulse{0%,100%{text-shadow:0 0 30px rgba(205,127,50,.7);}50%{text-shadow:0 0 70px rgba(205,127,50,1),0 0 100px rgba(205,127,50,.3);}}

.s2-scripture{
  max-width:22rem;margin:0 auto;padding:0 10px 2px;
  position:relative;
}
.s2-scripture p{padding:0;}
.s2-scripture-text{margin:0;}
.s2-scripture-text{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;
  font-size:clamp(1.28rem,5.4vw,1.75rem);
  color:rgba(92,51,23,.93);line-height:1.38;letter-spacing:.02em;
}
.s2-scripture-ref{
  margin:14px 0 0;padding:0;
  font-family:'Cinzel',serif;font-size:clamp(.72rem,2.8vw,.85rem);font-style:normal;font-weight:700;letter-spacing:2px;
  letter-spacing:5px;color:#5C3317;text-transform:uppercase;line-height:1.35;
}

.open-btn{
  padding:17px 42px;
  font-family:'Cormorant Garamond',serif;font-size:1rem;letter-spacing:3px;
  text-transform:none;color:#ffffff;
  background:linear-gradient(135deg,#8b5a2b,#daa06d,#cd7f32);
  border:none;border-radius:50px;cursor:pointer;font-weight:700;
  box-shadow:0 6px 32px rgba(205,127,50,.55),inset 0 1px 0 rgba(255,255,255,.3);
  -webkit-appearance:none;appearance:none;touch-action:manipulation;
  transition:transform .15s,box-shadow .15s;
}
.open-btn:active{transform:scale(.95);box-shadow:0 2px 12px rgba(205,127,50,.4);}

#s3{display:none;position:relative;min-height:100vh;background:#f5efe6;}
#s3.show{display:block;}
#flwCanvas{position:fixed;inset:0;pointer-events:none;z-index:0;}
.inv{position:relative;z-index:2;max-width:480px;margin:0 auto;padding:18px 13px 60px;}

.inv-head{
  text-align:center;padding:34px 18px 30px;
  background:linear-gradient(170deg,rgba(255,252,248,.97),rgba(245,239,230,.98));
  border:1px solid rgba(205,127,50,.28);border-radius:20px;
  box-shadow:0 16px 60px rgba(0,0,0,.85),inset 0 1px 0 rgba(205,127,50,.12);
  position:relative;overflow:hidden;margin-bottom:16px;
}
.inv-head::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(205,127,50,.09) 0%,transparent 60%);}
.fam-tag{font-family:'Cormorant Garamond',serif;font-size:.72rem;font-weight:700;letter-spacing:5px;color:#800000;text-transform:uppercase;margin-bottom:12px;}
.h-sub{font-family:'Cormorant Garamond',serif;font-size:.68rem;letter-spacing:5px;color:rgba(92,51,23,.65);text-transform:uppercase;margin-bottom:2px;}
.cname{
  font-family:'Great Vibes',cursive;
  font-size:clamp(2.3rem,9.5vw,3rem);
  color:#5C3317;line-height:1.2;
  text-shadow:0 0 22px rgba(205,127,50,.5);
}
.weds{font-family:'Cormorant Garamond',serif;font-size:.78rem;letter-spacing:10px;color:#5C3317;text-transform:uppercase;margin:5px 0;}
.couple-img-wrap{
  position:relative;margin:24px auto 14px;width:calc(100% - 26px);max-width:454px;border-radius:12px;overflow:hidden;
}
.couple-img-wrap::before{
  content:'';position:absolute;inset:-15px;
  background:radial-gradient(ellipse at center,rgba(212,175,55,.15) 0%,transparent 70%);
  z-index:0;
}
.couple-img{
  position:relative;z-index:1;
  width:100%;height:auto;display:block;
  opacity:0.85;
  border-radius:12px;
  border:1px solid rgba(212,175,55,.28);
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;color:rgba(92,51,23,.85);margin-top:12px;padding:0 8px;line-height:1.6;}

.cards{display:flex;flex-direction:column;gap:13px;margin-bottom:16px;}
.dcard{
  background:linear-gradient(160deg,rgba(250,246,240,.96),rgba(245,239,230,.98));
  border:1px solid rgba(205,127,50,.2);border-radius:16px;
  padding:22px 18px;text-align:center;position:relative;overflow:hidden;
  box-shadow:0 8px 28px rgba(0,0,0,.6);
}
.dcard::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#cd7f32,transparent);}
.card-ico{font-size:1.7rem;margin-bottom:8px;}
.card-lbl{font-family:'Cormorant Garamond',serif;font-size:.72rem;font-weight:700;letter-spacing:5px;color:#800000;text-transform:uppercase;margin-bottom:9px;}
.card-val{font-family:'Lato',sans-serif;font-size:.95rem;color:#5C3317;line-height:1.5;}
.card-val sup,.s2-sub sup{font-size:.55em;vertical-align:super;font-weight:400;}
.card-val b,.s2-sub b{font-weight:700;}
.card-sub{font-family:'Lato',sans-serif;font-size:.83rem;color:rgba(92,51,23,.78);margin-top:5px;line-height:1.5;}

/* Event + venue in one tile */
.tile-combined .tile-divider{
  height:1px;background:linear-gradient(90deg,transparent,rgba(205,127,50,.38),transparent);
  margin:18px 0 14px;
}
.tile-venue-loc{
  font-family:'Lato',sans-serif;font-size:.82rem;color:#5C3317;margin-bottom:10px;
}
.tile-venue{
  font-family:'Playfair Display',serif;font-size:1.05rem;color:#5C3317;line-height:1.45;margin-bottom:6px;
}
.tile-loc-note{
  font-family:'Lato',sans-serif;font-size:.82rem;color:rgba(92,51,23,.82);line-height:1.55;margin-bottom:12px;
}
.tile-combined .loc-photo-wrap{margin-top:2px;}
.tile-combined .loc-links{margin-top:4px;}

/* (legacy loc-card removed — locations live inside .tile-combined) */
.loc-links{display:flex;flex-direction:column;gap:10px;align-items:stretch;}
.map-link{
  display:block;text-align:center;padding:11px 18px;
  background:linear-gradient(135deg,rgba(205,127,50,.15),rgba(205,127,50,.07));
  border:1px solid rgba(205,127,50,.38);border-radius:28px;
  font-family:'Lato',sans-serif;font-size:.8rem;color:#5C3317;
  text-decoration:none;letter-spacing:1.2px;touch-action:manipulation;
}
.map-link:active{background:rgba(205,127,50,.28);}

/* Optional venue photo (taps open same Google Maps link as button) */
.loc-photo-wrap{
  display:block;margin:0 0 14px;border-radius:12px;overflow:hidden;
  border:1px solid rgba(205,127,50,.28);
  box-shadow:0 6px 24px rgba(0,0,0,.45);
  -webkit-tap-highlight-color:rgba(205,127,50,.25);
}
.loc-photo{
  width:100%;height:200px;object-fit:cover;display:block;opacity:0.4;
}

/* Google Drive photos */
.gallery-card{
  background:linear-gradient(160deg,rgba(2,2,18,.96),rgba(245,239,230,.98));
  border:1px solid rgba(205,127,50,.2);border-radius:16px;
  padding:18px 12px 16px;margin-bottom:16px;
  box-shadow:0 8px 28px rgba(0,0,0,.6);
}
.gallery-card::before{content:'';display:block;height:2px;margin:-18px -12px 14px;background:linear-gradient(90deg,transparent,#cd7f32,transparent);}
.gallery-hdr{
  font-family:'Cormorant Garamond',serif;font-size:.72rem;letter-spacing:5px;color:#5C3317;text-transform:uppercase;text-align:center;margin-bottom:12px;
}
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.photo-grid img{
  width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;
  border:1px solid rgba(205,127,50,.25);
  background:rgba(0,0,0,.35);
}
.gallery-note{
  font-family:'Lato',sans-serif;font-size:.72rem;color:rgba(92,51,23,.55);text-align:center;margin-top:12px;line-height:1.5;
}

.blessing{font-family:'Great Vibes',cursive;font-size:1.55rem;color:rgba(205,127,50,.5);text-align:center;margin:16px 0 8px;}
.inv-footer{
  background:linear-gradient(160deg,rgba(250,246,240,.96),rgba(245,239,230,.98));
  border:1px solid rgba(205,127,50,.2);border-radius:16px;
  padding:26px 18px;text-align:center;position:relative;overflow:hidden;
  box-shadow:0 8px 28px rgba(0,0,0,.6);
}
.inv-footer::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#cd7f32,transparent);}
.inv-by{font-family:'Cormorant Garamond',serif;font-size:.72rem;font-weight:700;letter-spacing:5px;color:#800000;text-transform:uppercase;margin-bottom:11px;}
.inv-names{font-family:'Lato',sans-serif;font-size:1.25rem;font-weight:400;color:#5C3317;line-height:1.85;}
.inv-names span{color:#5C3317;font-weight:600;}
.inv-note{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;color:rgba(92,51,23,.8);margin-top:9px;}

</style>
</head>

/* ---- Google Drive share URL → embeddable thumbnail URL ---- */
function driveFileIdFromLink(linkOrId) {
  const s = String(linkOrId).trim();
  if (!s) return null;
  const fromPath = s.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (fromPath) return fromPath[1];
  const fromQuery = s.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (fromQuery) return fromQuery[1];
  if (/^[a-zA-Z0-9_-]{10,}$/.test(s)) return s;
  return null;
}
function driveThumbnailUrl(linkOrId) {
  const id = driveFileIdFromLink(linkOrId);
  if (!id) return null;
  return 'https://drive.google.com/thumbnail?id=' + encodeURIComponent(id) + '&sz=w1200';
}

function lt(s) {
  return String(s).replace(/</g, '&lt;');
}

function renderEventVenueTiles(c) {
  const container = document.getElementById('eventVenueTiles');
  const tiles = (c && c.eventVenueTiles) || [];
  container.innerHTML = tiles
    .map(function (t) {
      const parts = [];
      parts.push('<div class="dcard tile-combined">');
      parts.push('<div class="card-ico">' + t.icon + '</div>');
      parts.push('<div class="card-lbl">' + lt(t.label) + '</div>');
      parts.push('<div class="card-val">' + t.value + '</div>');
      if (t.sub) {
        parts.push('<div class="card-sub">' + lt(t.sub) + '</div>');
      }
      const hasLinks = t.links && t.links.length > 0;
      const mainMapUrl = hasLinks ? t.links[0].url.replace(/"/g, '&quot;') : '';
      const showLocBlock = !!(t.venueLine || t.locationNote || t.venuePhotoUrl || hasLinks);
      if (showLocBlock) {
        if (t.venueLine) {
          parts.push('<div class="gold-bar" style="width:90%;margin:16px auto 12px;"><div class="gl"></div><div class="gd"></div><div class="gd" style="margin:0 3px"></div><div class="gd"></div><div class="gl"></div></div>');
          parts.push('<div class="tile-venue">' + lt(t.venueLine) + '</div>');
          if (t.venueLocation) parts.push('<div class="tile-venue-loc">' + lt(t.venueLocation) + '</div>');
        } else {
          parts.push('<div class="tile-divider"></div>');
        }
        if (t.locationNote) {
          parts.push('<div class="tile-loc-note">' + lt(t.locationNote) + '</div>');
        }
        if (t.venuePhotoUrl && hasLinks && mainMapUrl) {
          const pu = t.venuePhotoUrl.replace(/"/g, '&quot;');
          parts.push(
            '<a class="loc-photo-wrap" href="' +
              mainMapUrl +
              '" target="_blank" rel="noopener noreferrer"><img class="loc-photo" src="' +
              pu +
              '" alt="" loading="lazy" decoding="async" referrerpolicy="no-referrer"></a>'
          );
        }
        if (hasLinks) {
          parts.push(
            '<div class="loc-links">' +
              t.links
                .map(function (L) {
                  return (
                    '<a class="map-link" href="' +
                    L.url.replace(/"/g, '&quot;') +
                    '" target="_blank" rel="noopener noreferrer">' +
                    lt(L.label) +
                    '</a>'
                  );
                })
                .join('') +
              '</div>'
          );
        }
      }
      parts.push('</div>');
      return parts.join('');
    })
    .join('');
}

function applyConfig() {
  const c = INVITE_CONFIG;
  document.title = c.couple.first + ' & ' + c.couple.second + ' — Wedding';
  document.getElementById('s2Line1').textContent = c.s2Subtitle;
  document.getElementById('s2NameFirst').textContent = c.couple.first;
  document.getElementById('s2NameSecond').textContent = c.couple.second;
    document.getElementById('famTag').textContent = c.familyTag;
  document.getElementById('nameA').textContent = c.couple.first;
  document.getElementById('nameB').textContent = c.couple.second;
  document.getElementById('tagline').textContent = c.tagline;

  if (c.introScripture) {
    document.getElementById('s2ScriptureQuote').textContent = c.introScripture.quote;
    document.getElementById('s2ScriptureRef').textContent = c.introScripture.ref;
  }

  renderEventVenueTiles(c);

  const by = document.getElementById('invitedBy');
  by.innerHTML = (c.invitedByLines || []).map(function (row) {
    if (row.sep) return '<span style="font-size:.82rem;color:rgba(92,51,23,.45);">' + row.sep + '</span><br>';
    var cls = row.highlight ? ' style="color:#5C3317;font-weight:600;"' : '';
    return '<span' + cls + '>' + row.name.replace(/</g, '&lt;') + '</span><br>';
  }).join('');

  const raw = c.galleryDriveLinks || [];
  const ids = raw.map(driveFileIdFromLink).filter(Boolean);
  const grid = document.getElementById('photoGrid');
  const gcard = document.getElementById('galleryCard');
  if (ids.length) {
    gcard.style.display = 'block';
    grid.innerHTML = ids.map(function (id) {
      var u = driveThumbnailUrl(id);
      return '<img src="' + u + '" alt="Photo" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.opacity=.35;this.alt=&quot;Check Drive link is shared with anyone with the link&quot;">';
    }).join('');
  } else {
    gcard.style.display = 'none';
  }
}

// Preload images so they're ready when invitation opens
function preloadImages() {
  var images = [];
  
  // Preload venue photos
  if (INVITE_CONFIG.eventVenueTiles) {
    INVITE_CONFIG.eventVenueTiles.forEach(function(tile) {
      if (tile.venuePhotoUrl) {
        var img = new Image();
        img.src = tile.venuePhotoUrl;
        images.push(img);
      }
    });
  }
  
  // Preload gallery images
  if (INVITE_CONFIG.galleryDriveLinks) {
    INVITE_CONFIG.galleryDriveLinks.forEach(function(link) {
      var id = driveFileIdFromLink(link);
      if (id) {
        var img = new Image();
        img.src = driveThumbnailUrl(id);
        images.push(img);
      }
    });
  }
  
  return images;
}

function playBackgroundMusic() {
  if (!bgMusic || !bgMusic.src) return;
  bgMusic.play().catch(function(err) {
    // Autoplay blocked - try again on next user interaction
    document.body.addEventListener('click', function retry() {
      bgMusic.play();
      document.body.removeEventListener('click', retry);
    }, { once: true });
  });
}

// Pause music when tab is not visible (minimized, switched tabs, etc.)
document.addEventListener('visibilitychange', function() {
  if (!bgMusic) return;
  if (document.hidden) {
    bgMusic.pause();
  } else {
    // Resume only if it was playing before
    if (bgMusic.currentTime > 0) {
      bgMusic.play();
    }
  }
});

  var s2 = document.getElementById('s2');
  if (!s2 || s2.dataset.opening) return;
  s2.dataset.opening = '1';
  s2.style.transition = 'opacity 1s ease';
  s2.style.opacity = '0';
  
  // Start playing music
  playBackgroundMusic();
  
  setTimeout(function() {

    initFlowers();
  }, 1000);
});

  class F{
    constructor(init){this.reset(init);}
    reset(init){
      this.x=Math.random()*cv.width;this.y=init?Math.random()*cv.height:-20;
      this.r=5+Math.random()*13;this.petals=5+Math.floor(Math.random()*4);
      this.sp=.3+Math.random()*.7;this.rot=Math.random()*Math.PI*2;
      this.rs=(Math.random()-.5)*.025;this.swA=0;this.swS=.018+Math.random()*.02;
      this.sw=(Math.random()-.5)*.9;
      const cl=colors[Math.floor(Math.random()*colors.length)];
      this.c1=cl[0];this.c2=cl[1];this.a=.4+Math.random()*.4;
    }
    update(){this.y+=this.sp;this.swA+=this.swS;this.x+=Math.sin(this.swA)*this.sw;this.rot+=this.rs;if(this.y>cv.height+20)this.reset();}
    draw(){
      ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rot);ctx.globalAlpha=this.a;
      for(let i=0;i<this.petals;i++){
        const a=(i/this.petals)*Math.PI*2;ctx.save();ctx.rotate(a);
        const g=ctx.createRadialGradient(0,-this.r*.4,0,0,-this.r,this.r);
        g.addColorStop(0,this.c1);g.addColorStop(1,this.c2);
        ctx.fillStyle=g;ctx.beginPath();
        ctx.ellipse(0,-this.r,this.r*.38,this.r*.6,0,0,Math.PI*2);
        ctx.fill();ctx.restore();
      }
      ctx.beginPath();ctx.arc(0,0,this.r*.28,0,Math.PI*2);ctx.fillStyle='#daa06d';ctx.fill();ctx.restore();
    }
  }
  const flowers=[];for(let i=0;i<50;i++)flowers.push(new F(true));
  function loop(){ctx.clearRect(0,0,cv.width,cv.height);flowers.forEach(f=>{f.update();f.draw();});requestAnimationFrame(loop);}
  loop();
}
// Show content when fonts are loaded (with fallback timeout for iOS Safari)
var fontsShown = false;
function showFonts() {
  if (fontsShown) return;
  fontsShown = true;
  document.documentElement.classList.add('fonts-ready');
}
// Try document.fonts.ready if available
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(showFonts).catch(showFonts);
}
// Fallback: show after 2 seconds regardless (for iOS Safari compatibility)
setTimeout(showFonts, 2000);
// Also show immediately if document is already loaded and fonts might be cached
if (document.readyState === 'complete') {
  setTimeout(showFonts, 100);
}
